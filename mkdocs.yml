site_name: CADENCE
site_description: Cardiac optical-mapping signal processing and analysis toolkit
site_author: Kedar Aras (ARAS Lab)
repo_url: https://github.com/kedararas/Cadence
# Build the site with:  pip install mkdocs-material  &&  mkdocs serve  (preview)
#                        mkdocs gh-deploy            (publish to GitHub Pages)

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick start: quickstart.md
  - Modules:
      - Data Conversion: modules/data-conversion.md
      - Signal Conditioning: modules/signal-conditioning.md
      - Feature Extraction: modules/feature-extraction.md
      - Signal Analysis: modules/signal-analysis.md
      - Conduction Velocity: modules/conduction-velocity.md
  - Data format: data-format.md
  - Video tutorials: tutorials.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
